version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: torlan_mysql
    restart: always
    environment:
      MYSQL_DATABASE: torlan_pos
      MYSQL_ROOT_PASSWORD: root_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: